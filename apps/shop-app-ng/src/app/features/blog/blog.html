<section class="blog">
    <app-page-title class="signal-cart-header__title" title="Blog"></app-page-title>

    <ul class="blog__list">
      @for (post of blogPosts; track post.id) {
        <li class="blog__list-item">
          <h3 class="blog__list-item-title">{{ post.title }}</h3>
          <p>{{ post.date | ordinalDate }}</p>
          <p>{{ post.content }}</p>
        </li>
      }
    </ul>
</section>
