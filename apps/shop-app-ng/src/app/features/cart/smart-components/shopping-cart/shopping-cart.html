<section class="shopping-cart">
  <app-page-title title="Shopping Cart" class="shopping-cart__title"></app-page-title>

  @if (currentCartList$ | async; as currentCartList) {
    <ul class="shopping-cart__list">
      @for (item of currentCartList; track item.id) {
        <app-cart-item
          class="shopping-cart__item"
          [cartItem]="item"
          (remove)="removeItemFromCart($event)"
        >
        </app-cart-item>
      }
    </ul>

    <p><strong>Total Price: </strong>{{calculateTotalPrice(currentCartList) | currency:'USD' }}</p>
  } @else {
    <p>Loading...</p>
  }

  <app-button class="shopping-cart__add" (click)="addItemToCart()" label="Add New Item" ></app-button>
</section>
