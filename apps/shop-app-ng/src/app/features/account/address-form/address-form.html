<div class="form margin-auto">
  <h3 class="form__title">Add a New Address</h3>
  <form [formGroup]="addressForm">
    <div class="form__group">
      <label class="form__label" for="country">Country <span class="form__required-asterisk">*</span></label>
      <select class="form__control"
              [class.form__control--error]="isError('country')"
              id="country"
              formControlName="country">
        @if (addressForm.get('country')?.value===-1) {
          <option value="-1" selected="selected">{{ countryDefaultValue }}</option>
        }
        @for (item of countries; track item.id){
          <option [label]="item.name" [value]="item.id"></option>
        }
      </select>
      @if(isError('country')) {
        <p class="form__control-error">{{ errorMessages.required }}</p>
      }
    </div>

    <div class="form__group">
      <label class="form__label" for="fullName">Full Name <span class="form__required-asterisk">*</span></label>
      <input class="form__control"
              [class.form__control--error]="isError('fullName')"
              id="fullName"
              type="text"
              formControlName="fullName"/>
      @if(isError('fullName')) {
        <p class="form__control-error">{{ errorMessages.required }}</p>
      }
    </div>

    <div class="form__group">
      <label class="form__label" for="phoneNumber">Phone Number</label>
      <input class="form__control"
              [class.form__control--error]="isError('phoneNumber')"
              id="phoneNumber"
              type="text"
              formControlName="phoneNumber" />
      @if(isError('phoneNumber')) {
        <p class="form__control-error">{{ errorMessages.required }}</p>
      }
    </div>

    <div class="form__group">
      <label class="form__label" for="address">Address <span class="form__required-asterisk">*</span></label>
      <input class="form__control"
              [class.form__control--error]="isError('address')"
              id="address"
              type="text"
              formControlName="address" />
      @if(isError('address')) {
        <p class="form__control-error">{{ errorMessages.required }}</p>
      }
    </div>

    <div class="form__group">
      <app-button [type]="'submit'" class="form__button"  [disabled]="!addressForm.valid" (click)="submitForm()" label="Add Address" ></app-button>
    </div>
  </form>
</div>
