@if (isVisible()) {
  <div class="promo-bar">
    <div class="promo-bar__content">
      <div class="promo-bar__offer-details">
        <span class="promo-bar__badge">SALE</span>
        <span class="promo-bar__message">
           Use code <strong class="promo-bar__code">HELLO2026</strong> for 20% Off
        </span>
      </div>

      <app-countdown [targetDateStr]="promoBarDueDate"></app-countdown>
    </div>

    <button class="promo-bar__close-btn" (click)="close()">✕</button>
  </div>
}
