@if (cartItem) {
  <li class="cart-item">
    <h3>{{cartItem.cart.name}}</h3>
    <p>{{cartItem.cart.description}}</p>
    <p>
      <span>Quantity: </span><span>{{cartItem.quantity}}</span>
    </p>
    <p>
      <span>Color: </span><span>{{cartItem.color}}</span>
    </p>
    <app-button class="cart-item__remove"
                buttonSize="xs"
                label="Remove Item"
                (click)="removeItem()"
    >
    </app-button>
  </li>
}
