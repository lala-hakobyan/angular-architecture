@if (cartItem) {
  <li class="cart-item">
    <h3>{{cartItem.product.name}}</h3>
    <p>{{cartItem.product.description}}</p>
    <p>
      <strong>Quantity: </strong><span>{{cartItem.quantity}}</span>
    </p>
    <p>
      <strong>Color: </strong><span>{{cartItem.color}}</span>
    </p>
    <p>
      <strong>Price: </strong><span>{{calculateTotalPrice() | currency:'USD'}}</span>
    </p>

    @defer (hydrate on viewport) {
      <app-cart-details [details]="cartItem.product.details?? null" />
    } @placeholder {
      <div>Loading Details...</div>
    }

    <app-button class="cart-item__remove"
                buttonSize="xs"
                label="✖ &nbsp; Remove Item"
                (click)="removeItem()"
    >
    </app-button>


  </li>
}
